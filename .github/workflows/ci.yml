name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Pin to the workspace MSRV (1.88) so newly-released clippy lints on
      # latest stable don't break PRs out of band. The MSRV check below is
      # the right place to enforce 1.88 builds; clippy enforces style at
      # the same level. Bump both in lockstep when we roll forward.
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev
      - run: cargo clippy --workspace --exclude compass-vector-gpu --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev
      - run: cargo test --workspace --exclude compass-vector-gpu

  msrv:
    name: minimum supported Rust version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev
      - run: cargo build --workspace --exclude compass-vector-gpu

  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # `--ignore` flags here mirror `audit.toml`; rationale for each lives
      # there. `audit.toml`'s ignores show up as "allowed warnings" under
      # `--deny warnings`, which would still flunk CI, so we re-list them
      # on the CLI to skip them outright. Any *new* advisory will fail CI
      # because `continue-on-error` is gone.
      - run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0185 \
            --ignore RUSTSEC-2026-0186
